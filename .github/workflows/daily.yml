name: Daily Bot

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests requests-oauthlib

      - name: Run bot
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          SITE_URL:                ${{ secrets.SITE_URL }}
          DEVTO_API_KEY:           ${{ secrets.DEVTO_API_KEY }}
          TUMBLR_CONSUMER_KEY:     ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET:  ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_OAUTH_TOKEN:      ${{ secrets.TUMBLR_OAUTH_TOKEN }}
          TUMBLR_OAUTH_SECRET:     ${{ secrets.TUMBLR_OAUTH_SECRET }}
          TUMBLR_BLOG_NAME:        ${{ secrets.TUMBLR_BLOG_NAME }}
          STRIPE_SINGLE_URL:       ${{ secrets.STRIPE_SINGLE_URL }}
          STRIPE_SUB_URL:          ${{ secrets.STRIPE_SUB_URL }}
          FORMSPREE_ID:            ${{ secrets.FORMSPREE_ID }}
        run: python bot.py

      - name: Push site
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@auto.com"
          git add docs/
          git commit -m "Daily update $(date)" || echo "Nothing new"
          git push
